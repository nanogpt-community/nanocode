name: Build Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version for the release (e.g., 1.0.0)"
        required: true
        type: string
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  build-cli:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        run: |
          cd packages/opencode
          bun run build

      - uses: actions/upload-artifact@v4
        with:
          name: nanocode-cli
          path: packages/opencode/dist

  build-desktop:
    needs: build-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: blacksmith-8vcpu-windows-2025
            target: x86_64-pc-windows-msvc
          - host: blacksmith-8vcpu-ubuntu-2404
            target: x86_64-unknown-linux-gnu
          - host: blacksmith-16vcpu-ubuntu-2404-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import Code Signing Certificate
        if: runner.os == 'macOS'
        run: |
          # Decode the certificate
          echo "${{ secrets.APPLE_CERTIFICATE }}" | base64 --decode > certificate.p12
          
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Import the certificate (empty password for passwordless certs)
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "" -T /usr/bin/codesign -T /usr/bin/security
          
          # Set key partition list
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Add keychain to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          
          # Clean up
          rm certificate.p12
          
          echo "Certificate imported successfully"

      - name: Verify Certificate
        if: runner.os == 'macOS'
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning | grep "Developer ID Application" || echo "")
          if [ -n "$CERT_INFO" ]; then
            CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
            echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
            echo "Certificate imported: $CERT_ID"
          else
            echo "No Developer ID Application certificate found, continuing without code signing..."
          fi

      - name: Setup Apple API Key
        if: runner.os == 'macOS'
        run: |
          mkdir -p $RUNNER_TEMP
          echo "${{ secrets.APPLE_API_KEY_PATH }}" > $RUNNER_TEMP/apple-api-key.p8

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Use Blacksmith Sticky Disk for cargo registry (instant access vs cache download)
      - name: Mount cargo registry sticky disk
        if: runner.os == 'Linux'
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-cargo-registry-${{ matrix.target }}
          path: ~/.cargo/registry

      # Use Blacksmith's faster rust-cache for Linux builds (4x faster colocated cache)
      - uses: useblacksmith/rust-cache@v3
        if: runner.os == 'Linux'
        with:
          workspaces: packages/desktop/src-tauri
          shared-key: ${{ matrix.target }}

      # Use standard rust-cache for macOS/Windows (GitHub-hosted runners)
      - uses: Swatinem/rust-cache@v2
        if: runner.os != 'Linux'
        with:
          workspaces: packages/desktop/src-tauri
          shared-key: ${{ matrix.target }}

      - name: Install dependencies
        run: bun install

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: nanocode-cli
          path: cli-dist

      - name: Prepare sidecar (Unix)
        if: runner.os != 'Windows'
        run: |
          cd packages/desktop
          mkdir -p src-tauri/sidecars
          
          # Map matrix target to CLI binary folder name (matches build.ts output structure)
          case "${{ matrix.target }}" in
            "aarch64-apple-darwin") CLI_DIR="nanocode-darwin-arm64" ;;
            "x86_64-apple-darwin") CLI_DIR="nanocode-darwin-x64" ;;
            "x86_64-unknown-linux-gnu") CLI_DIR="nanocode-linux-x64" ;;
            "aarch64-unknown-linux-gnu") CLI_DIR="nanocode-linux-arm64" ;;
          esac
          
          # The build script outputs to: dist/{platform-dir}/bin/nanocode
          CLI_PATH="../../cli-dist/${CLI_DIR}/bin/nanocode"
          
          echo "Looking for CLI at: ${CLI_PATH}"
          echo "Contents of cli-dist:"
          ls -la ../../cli-dist/ || echo "cli-dist not found"
          
          if [ -f "$CLI_PATH" ]; then
            cp "$CLI_PATH" "src-tauri/sidecars/nanocode-cli-${{ matrix.target }}"
            chmod +x "src-tauri/sidecars/nanocode-cli-${{ matrix.target }}"
            echo "Copied CLI to sidecar folder"
            ls -la src-tauri/sidecars/
          else
            echo "Error: Could not find CLI binary at ${CLI_PATH}"
            echo "Searching for any nanocode binaries:"
            find ../../cli-dist -name "nanocode" -type f 2>/dev/null || echo "None found"
            exit 1
          fi

      - name: Prepare sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd packages/desktop
          New-Item -ItemType Directory -Force -Path src-tauri/sidecars
          
          # The build script outputs to: dist/nanocode-windows-x64/bin/nanocode.exe
          $cliPath = "../../cli-dist/nanocode-windows-x64/bin/nanocode.exe"
          
          Write-Host "Looking for CLI at: $cliPath"
          Write-Host "Contents of cli-dist:"
          Get-ChildItem -Path ../../cli-dist -Recurse -Depth 2 | ForEach-Object { Write-Host $_.FullName }
          
          if (Test-Path $cliPath) {
            Copy-Item $cliPath "src-tauri/sidecars/nanocode-cli-${{ matrix.target }}.exe"
            Write-Host "Copied CLI to sidecar folder"
            Get-ChildItem src-tauri/sidecars/
          } else {
            Write-Host "Error: Could not find CLI binary at $cliPath"
            exit 1
          }

      # Fixes AppImage build issues
      - name: Install tauri-cli from portable appimage branch
        if: runner.os == 'Linux'
        run: |
          cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage --force
          echo "Installed tauri-cli version:"
          cargo tauri --version

      - name: Build Tauri app
        timeout-minutes: 30
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple-api-key.p8
        with:
          projectPath: packages/desktop
          tauriScript: ${{ runner.os == 'Linux' && 'cargo tauri' || '' }}
          args: --target ${{ matrix.target }} --config ./src-tauri/tauri.prod.conf.json --verbose

      - name: Debug - Show generated bundle files
        if: always()
        run: |
          echo "=== Bundle directory contents ==="
          find packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle -type f 2>/dev/null || echo "Bundle directory not found"
        shell: bash

      - name: Rename updater artifacts with architecture (Unix)
        if: runner.os != 'Windows'
        run: |
          BUNDLE_DIR="packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          
          # Rename macOS .app.tar.gz files to include architecture
          if [ -d "$BUNDLE_DIR/macos" ]; then
            for file in "$BUNDLE_DIR/macos"/*.app.tar.gz; do
              if [ -f "$file" ]; then
                base=$(basename "$file" .app.tar.gz)
                # Map target to short arch name
                case "${{ matrix.target }}" in
                  "aarch64-apple-darwin") ARCH="aarch64" ;;
                  "x86_64-apple-darwin") ARCH="x64" ;;
                  *) ARCH="${{ matrix.target }}" ;;
                esac
                newname="${base}_${ARCH}.app.tar.gz"
                echo "Renaming $file to $BUNDLE_DIR/macos/$newname"
                mv "$file" "$BUNDLE_DIR/macos/$newname"
                # Also rename the signature if it exists
                if [ -f "${file}.sig" ]; then
                  mv "${file}.sig" "$BUNDLE_DIR/macos/${newname}.sig"
                fi
              fi
            done
            echo "=== macOS bundle after rename ==="
            ls -la "$BUNDLE_DIR/macos/" || true
          fi

      - name: Rename updater artifacts with architecture (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundleDir = "packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis"
          
          if (Test-Path $bundleDir) {
            Get-ChildItem -Path $bundleDir -Filter "*.nsis.zip" | ForEach-Object {
              $newName = $_.Name -replace "\.nsis\.zip$", "_x64.nsis.zip"
              $newPath = Join-Path $bundleDir $newName
              Write-Host "Renaming $($_.FullName) to $newPath"
              Move-Item $_.FullName $newPath -Force
              
              # Also rename signature
              $sigFile = "$($_.FullName).sig"
              if (Test-Path $sigFile) {
                Move-Item $sigFile "$newPath.sig" -Force
              }
            }
            Write-Host "=== NSIS bundle after rename ==="
            Get-ChildItem -Path $bundleDir
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nanocode-desktop-${{ matrix.target }}
          path: |
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz.sig
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.zip
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.zip.sig
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.json

  create-release:
    needs: build-desktop
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release files
        run: |
          mkdir -p release-files
          # Copy all distributable files including updater artifacts (.app.tar.gz, .nsis.zip)
          find artifacts -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.msi" -o -name "*.nsis.zip" -o -name "*.nsis.zip.sig" -o -name "*.sig" \) -exec cp {} release-files/ \;
          echo "Release files:"
          ls -la release-files/

      - name: Generate latest.json for auto-updates
        run: |
          VERSION="${{ inputs.version }}"
          RELEASE_URL="https://github.com/nanogpt-community/nanocode/releases/download/v${VERSION}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Read signatures
          DARWIN_X64_SIG=""
          DARWIN_ARM64_SIG=""
          LINUX_X64_SIG=""
          LINUX_ARM64_SIG=""
          WINDOWS_X64_SIG=""
          
          # Find and read signature files
          # macOS uses .app.tar.gz for updates (renamed to include architecture)
          if [ -f "release-files/NanoCode_x64.app.tar.gz.sig" ]; then
            DARWIN_X64_SIG=$(cat "release-files/NanoCode_x64.app.tar.gz.sig")
          fi
          if [ -f "release-files/NanoCode_aarch64.app.tar.gz.sig" ]; then
            DARWIN_ARM64_SIG=$(cat "release-files/NanoCode_aarch64.app.tar.gz.sig")
          fi
          if [ -f "release-files/NanoCode_${VERSION}_amd64.AppImage.sig" ]; then
            LINUX_X64_SIG=$(cat "release-files/NanoCode_${VERSION}_amd64.AppImage.sig")
          fi
          if [ -f "release-files/NanoCode_${VERSION}_aarch64.AppImage.sig" ]; then
            LINUX_ARM64_SIG=$(cat "release-files/NanoCode_${VERSION}_aarch64.AppImage.sig")
          fi
          # Windows NSIS zip - renamed to include _x64
          if [ -f "release-files/NanoCode_${VERSION}_x64-setup_x64.nsis.zip.sig" ]; then
            WINDOWS_X64_SIG=$(cat "release-files/NanoCode_${VERSION}_x64-setup_x64.nsis.zip.sig")
          fi
          
          echo "Signatures found:"
          echo "  Darwin x64: ${DARWIN_X64_SIG:0:50}..."
          echo "  Darwin arm64: ${DARWIN_ARM64_SIG:0:50}..."
          echo "  Linux x64: ${LINUX_X64_SIG:0:50}..."
          echo "  Linux arm64: ${LINUX_ARM64_SIG:0:50}..."
          echo "  Windows x64: ${WINDOWS_X64_SIG:0:50}..."
          
          # Generate latest.json
          cat > release-files/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes at https://github.com/nanogpt-community/nanocode/releases/tag/v${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-x86_64": {
                "signature": "${DARWIN_X64_SIG}",
                "url": "${RELEASE_URL}/NanoCode_x64.app.tar.gz"
              },
              "darwin-aarch64": {
                "signature": "${DARWIN_ARM64_SIG}",
                "url": "${RELEASE_URL}/NanoCode_aarch64.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "${LINUX_X64_SIG}",
                "url": "${RELEASE_URL}/NanoCode_${VERSION}_amd64.AppImage"
              },
              "linux-aarch64": {
                "signature": "${LINUX_ARM64_SIG}",
                "url": "${RELEASE_URL}/NanoCode_${VERSION}_aarch64.AppImage"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_X64_SIG}",
                "url": "${RELEASE_URL}/NanoCode_${VERSION}_x64-setup_x64.nsis.zip"
              }
            }
          }
          EOF
          
          echo "Generated latest.json:"
          cat release-files/latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: NanoCode Desktop v${{ inputs.version }}
          draft: ${{ inputs.draft }}
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
