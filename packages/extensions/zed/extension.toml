id = "nanocode"
name = "NanoCode"
description = "The open source coding agent for nano-gpt.com"
version = "1.1.40"
schema_version = 1
authors = ["0xGingi"]
repository = "https://github.com/nanogpt-community/nanocode"

[agent_servers.nanocode]
name = "NanoCode"
icon = "./icons/nano.svg"

[agent_servers.nanocode.targets.darwin-aarch64]
archive = "https://github.com/nanogpt-community/nanocode/releases/download/v1.1.40/nanocode-cli-darwin-arm64.zip"
cmd = "./nanocode"
args = ["acp"]

[agent_servers.nanocode.targets.darwin-x86_64]
archive = "https://github.com/nanogpt-community/nanocode/releases/download/v1.1.40/nanocode-cli-darwin-x64.zip"
cmd = "./nanocode"
args = ["acp"]

[agent_servers.nanocode.targets.linux-aarch64]
archive = "https://github.com/nanogpt-community/nanocode/releases/download/v1.1.40/nanocode-cli-linux-arm64.tar.gz"
cmd = "./nanocode"
args = ["acp"]

[agent_servers.nanocode.targets.linux-x86_64]
archive = "https://github.com/nanogpt-community/nanocode/releases/download/v1.1.40/nanocode-cli-linux-x64.tar.gz"
cmd = "./nanocode"
args = ["acp"]

[agent_servers.nanocode.targets.windows-x86_64]
archive = "https://github.com/nanogpt-community/nanocode/releases/download/v1.1.40/nanocode-cli-windows-x64.zip"
cmd = "./nanocode.exe"
args = ["acp"]
